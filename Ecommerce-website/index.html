<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOVA – Premium Tech Gadgets Store</title>
<meta name="description" content="NOVA – Premium tech gadgets. Smartphones, smartwatches, earbuds, headphones, keyboards, laptops & more." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NAVBAR -->
<header class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="#" class="logo" data-route="home">NOVA<span>.</span></a>
    <nav class="nav-links" id="navLinks">
      <a href="#" data-route="home">Home</a>
      <a href="#" data-route="products">Products</a>
      <a href="#" data-route="about">About</a>
      <a href="#" data-route="contact">Contact</a>
    </nav>
    <div class="nav-actions">
      <button class="icon-btn" id="searchToggle" aria-label="Search">🔍</button>
      <button class="icon-btn" data-route="wishlist" aria-label="Wishlist">♡<span class="badge" id="wishBadge">0</span></button>
      <button class="icon-btn" data-route="cart" aria-label="Cart">🛒<span class="badge" id="cartBadge">0</span></button>
      <button class="menu-btn" id="menuBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="search-bar" id="searchBar">
    <input type="text" id="searchInput" placeholder="Search products..." />
  </div>
</header>

<main id="app"></main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-grid">
    <div>
      <h3 class="logo">NOVA<span>.</span></h3>
      <p class="muted">Premium tech designed for the future.</p>
    </div>
    <div>
      <h4>Shop</h4>
      <a href="#" data-route="products">All Products</a>
      <a href="#" data-route="products">Smartphones</a>
      <a href="#" data-route="products">Laptops</a>
    </div>
    <div>
      <h4>Company</h4>
      <a href="#" data-route="about">About</a>
      <a href="#" data-route="contact">Contact</a>
    </div>
    <div>
      <h4>Follow</h4>
      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
      <a href="#">YouTube</a>
    </div>
  </div>
  <div class="copy muted">© 2026 NOVA. All rights reserved.</div>
</footer>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card" id="modalCard"></div>
</div>

<script src="script.js"></script>
</body>
</html>
